# Runs type checks, unit tests, and builds for the frontend and backend on
# every push and pull request. Must pass before merging to main - the
# Deploy workflow runs separately on push to main.
name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: npm audit
        run: npm audit --audit-level=high
        working-directory: frontend

      - name: Run tests
        run: npm test
        working-directory: frontend

      - name: Build (production)
        run: npm run build
        working-directory: frontend

  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: npm audit
        run: npm audit --audit-level=high
        working-directory: backend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: backend

      - name: Run tests
        run: npm test
        working-directory: backend

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # v3

      - name: Build SAM application
        run: sam build
        working-directory: backend

  infra:
    name: Infra checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install cfn-lint
        run: pip install cfn-lint

      - name: Lint CloudFormation templates
        run: cfn-lint backend/template.yaml
