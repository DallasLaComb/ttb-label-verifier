<nav class="sticky top-0 z-50 bg-ttb-navy shadow-md">
  <div class="w-full px-4 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <!-- Brand -->
      <a
        class="flex items-center gap-2.5 font-bold text-white no-underline text-lg tracking-tight shrink-0"
        routerLink="/"
        (click)="closeMenu()"
      >
        <img src="favicon.png" alt="" class="h-8 w-8 rounded-full bg-white p-0.5" />
        ColaReady
      </a>

      <!-- Mobile: hamburger -->
      <button
        class="lg:hidden p-2 rounded-md text-white/80 hover:bg-white/10 hover:text-white transition-colors"
        type="button"
        [attr.aria-expanded]="menuOpen()"
        aria-controls="mainNav"
        aria-label="Toggle navigation"
        (click)="toggleMenu()"
      >
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          />
        </svg>
      </button>

      <!-- Nav links -->
      <div
        id="mainNav"
        [class]="
          menuOpen()
            ? 'flex flex-col lg:flex-row absolute lg:static top-16 left-0 right-0 bg-ttb-navy border-b border-white/10 shadow-lg lg:shadow-none px-4 lg:px-0 pb-4 lg:pb-0 lg:flex'
            : 'hidden lg:flex'
        "
      >
        <ul class="flex flex-col lg:flex-row lg:items-center gap-0.5 lg:gap-1 mt-3 lg:mt-0">
          <li>
            <a
              class="block px-3 py-2 rounded-md text-sm text-white/80 hover:text-white hover:bg-white/10 transition-colors no-underline"
              routerLink="/"
              routerLinkActive="!text-ttb-gold font-semibold"
              [routerLinkActiveOptions]="{ exact: true }"
              (click)="closeMenu()"
              >Verify</a
            >
          </li>
          <li>
            <a
              class="block px-3 py-2 rounded-md text-sm text-white/80 hover:text-white hover:bg-white/10 transition-colors no-underline"
              routerLink="/about"
              routerLinkActive="!text-ttb-gold font-semibold"
              (click)="closeMenu()"
              >About</a
            >
          </li>
          <li>
            <a
              class="block px-3 py-2 rounded-md text-sm text-white/80 hover:text-white hover:bg-white/10 transition-colors no-underline"
              routerLink="/faq"
              routerLinkActive="!text-ttb-gold font-semibold"
              (click)="closeMenu()"
              >FAQ</a
            >
          </li>
          <li>
            <a
              class="block px-3 py-2 rounded-md text-sm text-white/80 hover:text-white hover:bg-white/10 transition-colors no-underline"
              routerLink="/resources"
              routerLinkActive="!text-ttb-gold font-semibold"
              (click)="closeMenu()"
              >Resources</a
            >
          </li>
          <li>
            <a
              class="block px-3 py-2 rounded-md text-sm text-white/80 hover:text-white hover:bg-white/10 transition-colors no-underline"
              routerLink="/contact"
              routerLinkActive="!text-ttb-gold font-semibold"
              (click)="closeMenu()"
              >Contact</a
            >
          </li>
          <li>
            <button
              type="button"
              class="block w-full text-left px-3 py-2 rounded-md text-sm text-white/80 hover:text-white hover:bg-white/10 transition-colors"
              (click)="logout()"
            >
              Logout
            </button>
          </li>
        </ul>
      </div>
    </div>
  </div>
</nav>
