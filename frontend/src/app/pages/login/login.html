<main class="min-h-dvh flex items-center justify-center px-4 bg-gray-50">
  <div class="w-full max-w-sm border border-gray-300 rounded-xl p-6 flex flex-col gap-5 bg-white">
    <div class="flex flex-col items-center gap-2 text-center">
      <img src="favicon.png" alt="" class="h-10 w-10 rounded-full" />
      <h1 class="text-2xl font-bold text-ttb-navy m-0">ColaReady</h1>
      <p class="text-sm text-gray-600 m-0">Sign in to continue</p>
    </div>

    <form class="flex flex-col gap-4" (ngSubmit)="onSubmit()">
      <div class="flex flex-col gap-1">
        <label for="username" class="text-sm font-medium">Username</label>
        <input
          id="username"
          name="username"
          type="text"
          autocomplete="username"
          required
          [(ngModel)]="username"
          class="rounded-md border border-gray-300 px-3 py-2 text-sm"
        />
      </div>

      <div class="flex flex-col gap-1">
        <label for="password" class="text-sm font-medium">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
          [(ngModel)]="password"
          class="rounded-md border border-gray-300 px-3 py-2 text-sm"
        />
      </div>

      @if (error()) {
        <p class="text-sm text-red-600 m-0">{{ error() }}</p>
      }

      <button
        type="submit"
        [disabled]="loading()"
        class="rounded-md bg-ttb-navy text-white font-semibold py-2 text-sm hover:bg-ttb-navy/90 disabled:opacity-60"
      >
        {{ loading() ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>

    <p class="text-xs text-gray-500 text-center m-0">
      This login exists only to prevent unauthorized use of this prototype's AI-powered label
      review &mdash; it is not a TTB account or system.
    </p>
  </div>
</main>
